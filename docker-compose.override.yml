services:
  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NODE_ENV=development
    command: npm run dev -- -H 0.0.0.0 -p 3000

  backend:
    volumes:
        - ./backend/unilm:/app/unilm
        - ./backend/prompts.yaml:/app/prompts.yaml
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    command: uvicorn unilm.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
